name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Node.js dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build Next.js static export
        run: bun run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0" 2>/dev/null || true
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" 2>/dev/null || true

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --warning-mode all

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tic-tac-toe-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
